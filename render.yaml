services:
  - type: web
    name: career-guidance-system
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: corepack enable; pnpm install --frozen-lockfile; pnpm prisma generate; pnpm build
    startCommand: pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false